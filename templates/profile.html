{% extends 'base.html' %}
{% block content %}

<div class="container">
    <div class="card shadow p-5 text-center">
        <i class="fas fa-user-circle fa-5x text-primary mb-3"></i>
        <h3>{{ user.name }}</h3>
        <p class="text-muted">{{ user.email }}</p>
        <span class="badge bg-primary fs-5">{{ user.role|upper }}</span>

        <div class="mt-4">
            <a href="#" class="btn btn-outline-primary">Change Password</a>
            <a href="#" class="btn btn-outline-secondary ms-2">Edit Profile</a>
        </div>
    </div>
</div>

{% endblock %}
